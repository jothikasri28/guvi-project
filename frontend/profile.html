<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4 shadow">

        <h3 class="text-center">Profile</h3>

        <form id="profileForm">

            <input type="text" id="name" class="form-control mb-2" placeholder="Name" readonly>

            <input type="email" id="email" class="form-control mb-2" readonly>

            <input type="number" id="age" class="form-control mb-2" placeholder="Age">

            <input type="date" id="dob" class="form-control mb-2">

            <input type="text" id="contact" class="form-control mb-2" placeholder="Contact">

            <button type="submit" class="btn btn-primary w-100">Update</button>

        </form>

        <button class="btn btn-danger mt-3" onclick="logout()">Logout</button>

    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/profile.js"></script>

<script>
function logout() {
    localStorage.removeItem("user");
    window.location.href = "login.html";
}
</script>

</body>
</html>
